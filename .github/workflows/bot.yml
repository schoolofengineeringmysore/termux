name: Humanoid Ad-Bot

on:
  workflow_dispatch:

jobs:
  engage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Firefox
        run: npx playwright install firefox --with-deps

      - name: Run Humanoid Ad-Bot
        run: node bot.js
        env:
          MAX_LOOPS: 99999999
          LOOP_DELAY_MS: 15000
